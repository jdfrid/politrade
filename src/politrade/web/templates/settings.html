{% extends "base.html" %}
{% block title %}הגדרות Crypto{% endblock %}
{% block content %}
<h1>הגדרות Crypto 5m</h1>
<p class="muted">פרמטרים לחלון ההימור (דקות 3–4) ורווח מינימלי.</p>

<form method="post" action="/api/settings" class="card settings-form">
  <h2>הימור</h2>
  <div class="field-grid">
    <label>
      <span>סכום הימור ($)</span>
      <input type="number" name="crypto_bet_usd" min="1" max="500" step="1" value="{{ settings.crypto_bet_usd }}" required>
    </label>
    <label>
      <span>רווח מינימלי (%)</span>
      <input type="number" name="crypto_min_edge_pct" min="5" max="50" step="1" value="{{ settings.crypto_min_edge_pct }}" required>
      <small class="muted">15% = מחיר כניסה עד ~0.87</small>
    </label>
    <label>
      <span>מחיר כניסה מקסימלי</span>
      <input type="number" name="crypto_max_entry_price" min="0.5" max="0.99" step="0.01" value="{{ settings.crypto_max_entry_price }}" required>
    </label>
    <label>
      <span>תזוזה מינימלית Chainlink (%)</span>
      <input type="number" name="crypto_min_move_pct" min="0.01" max="1" step="0.01" value="{{ settings.crypto_min_move_pct }}" required>
    </label>
    <label>
      <span>לא להמר ב-X שניות ראשונות</span>
      <input type="number" name="crypto_no_bet_first_seconds" min="60" max="240" value="{{ settings.crypto_no_bet_first_seconds }}" required>
    </label>
    <label>
      <span>לא להמר ב-X שניות אחרונות</span>
      <input type="number" name="crypto_no_bet_last_seconds" min="30" max="120" value="{{ settings.crypto_no_bet_last_seconds }}" required>
    </label>
    <label>
      <span>מטבעות (מופרדים בפסיק)</span>
      <input type="text" name="crypto_assets" value="{{ settings.crypto_assets }}" placeholder="btc,eth" required>
      <small class="muted">btc, eth, sol, xrp</small>
    </label>
    <label class="checkbox-label">
      <span>הימור אוטומטי</span>
      <input type="checkbox" name="crypto_auto_bet" value="1" {% if settings.crypto_auto_bet %}checked{% endif %}>
    </label>
  </div>

  <div class="btn-row form-actions">
    <button type="submit" class="btn primary">שמור</button>
    <a href="/crypto" class="btn secondary">← חזרה ל-Crypto</a>
    <a href="/wallet" class="btn secondary">ארנק</a>
  </div>
</form>
{% endblock %}
