# Render Blueprint — https://github.com/jdfrid/politrade
# Web dashboard + bot control from the UI (single service)

services:
  - type: web
    name: politrade-web
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn politrade.web.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:////var/data/politrade.db
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: FUNDER_ADDRESS
        sync: false
      - key: SIGNATURE_TYPE
        value: "1"
      - key: MAX_POSITION_USD
        value: "5"
      - key: TAKE_PROFIT_MULTIPLIER
        value: "2.0"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    disk:
      name: politrade-data
      mountPath: /var/data
      sizeGB: 1
